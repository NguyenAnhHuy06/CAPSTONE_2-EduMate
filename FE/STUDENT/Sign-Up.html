<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduShare - Login & Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-light: #f4f7ff;
            --text-gray: #666;
            --border-color: #e1e1e1;
            --error-color: #dc3545;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .logo i {
            background: var(--primary-blue);
            color: white;
            font-size: 25px;
            padding: 10px;
            border-radius: 10px;
        }

        .logo h1 {
            font-size: 35px;
            font-weight: 700;
            color: #111;
        }

        .header p {
            color: var(--text-gray);
            font-size: 18px;
        }

        /* Phần Welcome mới thêm vào */
        .welcome-text {
            margin-bottom: 25px;
        }

        .welcome-text h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111;
        }

        .welcome-text p {
            color: var(--text-gray);
            font-size: 15px;
        }

        .card {
            background: white;
            padding: 32px;
            padding-top: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }

        .card p {
            color: var(--text-gray);
            font-size: 18px;
        }

        .tabs {
            background: #f1f3f6;
            padding: 4px;
            border-radius: 20px;
            display: flex;
            margin-bottom: 24px;
        }

        .tabs button {
            font-size: 16px;
            border-radius: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #555;
        }

        .tab.active {
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            color: #000;
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
        }

        .form-group {
            text-align: left;
            margin-bottom: 0px;
        }

        .form-group label {
            margin-top: 0px;
            font-size: 14px;
        }

        .form-group #id-label {
            margin-top: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: #9ca3af;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 11px 11px 11px 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .error-msg {
            color: var(--error-color);
            font-size: 11px;
            margin-top: 0px;
            display: block;
            min-height: 14px;
        }

        #otp-section {
            background: #eff6ff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px dashed var(--primary-blue);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- THÔNG BÁO Ở GÓC DƯỚI BÊN TRÁI --- */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: none;
            animation: slideInLeft 0.4s ease forwards;
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            background-color: var(--success-color);
        }

        .toast-error {
            background-color: var(--error-color);
        }

        .toast-info {
            background-color: var(--primary-blue);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: var(--primary-blue);
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="toast"></div>

    <div class="container">
        <div class="header">
            <div class="logo"><i class="fas fa-graduation-cap"></i>
                <h1 style="display:inline; margin-left:10px;">EduMate</h1>
            </div>
            <p style="color:#666; margin-top:10px;">Your University Learning Platform</p>
        </div>

        <div class="card">
            <div class="welcome-text">
                <h2>Welcome</h2>
                <p>Sign in to your account or create a new one</p>
            </div>

            <div class="tabs">
                <button class="tab" id="tab-login" onclick="switchForm('login')">Login</button>
                <button class="tab active" id="tab-register" onclick="switchForm('register')">Register</button>
            </div>

            <form id="form-login" class="form-content">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper"><i class="far fa-envelope"></i><input type="text" id="login-email"
                            placeholder="student@dtu.edu.vn"></div>
                    <span class="error-msg" id="err-login-email"></span>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="login-pass"
                            placeholder="Enter your password"></div>
                    <span class="error-msg" id="err-login-pass"></span>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <form id="form-register" class="form-content active">
                <div id="main-reg-fields">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper"><i class="far fa-user"></i><input type="text" id="reg-name"
                                placeholder="Nhung Tuyet"></div>
                        <span class="error-msg" id="err-reg-name"></span>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper"><i class="far fa-envelope"></i><input type="text" id="reg-email"
                                placeholder="student@dtu.edu.vn"></div>
                        <span class="error-msg" id="err-reg-email"></span>
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <div class="input-wrapper">
                            <i class="far fa-circle-user"></i>
                            <select id="reg-role">
                                <option value="student">Student</option>
                                <option value="lecturer">Lecturer</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label id="id-label">Student ID</label>
                        <div class="input-wrapper"><i class="far fa-id-card"></i><input type="text" id="reg-sid"
                                placeholder="e.g. 28209043094"></div>
                        <span class="error-msg" id="err-reg-sid"></span>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="reg-pass"
                                placeholder="Create a strong password"></div>
                        <span class="error-msg" id="err-reg-pass"></span>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="reg-confirm"
                                placeholder="Confirm your password"></div>
                        <span class="error-msg" id="err-reg-confirm"></span>
                    </div>
                </div>

                <div id="otp-section">
                    <label style="color: var(--primary-blue); font-size: 16px;">Verify OTP</label>
                    <p style="font-size: 12px; color: #555; margin: 10px 0;">Mã OTP đã được gửi về Email của bạn.</p>
                    <div class="input-wrapper">
                        <i class="fas fa-key"></i>
                        <input type="text" id="reg-otp" placeholder="Nhập 6 số" maxlength="6">
                    </div>
                    <span class="error-msg" id="err-reg-otp"></span>
                </div>

                <button type="submit" id="btn-reg-main" class="btn-submit">Create Account</button>
            </form>
        </div>
        <a href="#" class="back-link" style="font-size: 16px; margin-top: 10px;">Back to home</a>
    </div>

    <script>
        const roleSelect = document.getElementById('reg-role');
        const idLabel = document.getElementById('id-label');
        const idInput = document.getElementById('reg-sid');
        const otpSection = document.getElementById('otp-section');
        const mainFields = document.getElementById('main-reg-fields');
        const btnReg = document.getElementById('btn-reg-main');
        const toastEl = document.getElementById('toast');

        function showToast(msg, type = 'info') {
            toastEl.innerText = msg;
            toastEl.className = `toast-${type}`;
            toastEl.style.display = 'block';
            setTimeout(() => { toastEl.style.display = 'none'; }, 3000);
        }

        roleSelect.addEventListener('change', function () {
            if (this.value === 'lecturer') {
                idLabel.innerText = 'Lecturer ID';
                idInput.placeholder = 'e.g. LEC12345';
            } else {
                idLabel.innerText = 'Student ID';
                idInput.placeholder = 'e.g. 28209043094';
            }
        });

        function switchForm(name) {
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`form-${name}`).classList.add('active');
            document.getElementById(`tab-${name}`).classList.add('active');
            otpSection.style.display = 'none';
            mainFields.style.display = 'block';
            btnReg.innerText = 'Create Account';
            document.querySelectorAll('.error-msg').forEach(el => el.innerText = '');
        }

        document.getElementById('form-register').addEventListener('submit', function (e) {
            e.preventDefault();

            if (otpSection.style.display === 'block') {
                const otp = document.getElementById('reg-otp').value;
                if (otp.length < 6) {
                    document.getElementById('err-reg-otp').innerText = "Vui lòng nhập đủ 6 số";
                } else {
                    showToast("Đăng ký thành công!", "success");
                    setTimeout(() => switchForm('login'), 2000);
                }
                return;
            }

            let isValid = true;
            document.querySelectorAll('#form-register .error-msg').forEach(el => el.innerText = '');

            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (document.getElementById('reg-name').value.trim() === "") {
                document.getElementById('err-reg-name').innerText = "Vui lòng nhập họ tên";
                isValid = false;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(document.getElementById('reg-email').value)) {
                document.getElementById('err-reg-email').innerText = "Email không hợp lệ";
                isValid = false;
            }
            if (idInput.value.trim() === "") {
                document.getElementById('err-reg-sid').innerText = idLabel.innerText + " trống";
                isValid = false;
            }
            if (pass.length < 8) {
                document.getElementById('err-reg-pass').innerText = "Tối thiểu 8 ký tự";
                isValid = false;
            }
            if (pass !== confirm) {
                document.getElementById('err-reg-confirm').innerText = "Mật khẩu không khớp";
                isValid = false;
            }

            if (isValid) {
                mainFields.style.display = 'none';
                otpSection.style.display = 'block';
                btnReg.innerText = 'Verify & Register';
                showToast("Đã gửi OTP vào Email!", "info");
            } else {
                showToast("Thông tin chưa hợp lệ!", "error");
            }
        });

        document.getElementById('form-login').addEventListener('submit', function (e) {
            e.preventDefault();
            showToast("Đang xử lý đăng nhập...", "info");
        });
    </script>
</body>

</html>
